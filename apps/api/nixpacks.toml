[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9.15.0", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @chess/api db:generate",
  "pnpm --filter @chess/api db:deploy",
  "pnpm --filter @chess/api build"
]

[start]
cmd = "node apps/api/dist/index.js"
